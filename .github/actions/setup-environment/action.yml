name: 'Setup Environment'
description: 'Prepare Node and pnpm tooling for Mission CI and release workflows.'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Enable Corepack
      shell: bash
      run: |
        corepack enable
        COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install

    - name: Install Workspace Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
