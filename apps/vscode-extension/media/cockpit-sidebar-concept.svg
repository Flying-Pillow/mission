<!--
	@file apps/vscode-extension/media/cockpit-sidebar-concept.svg
	@description Illustrates the target Mission contributor cockpit sidebar with atmospheric instrumentation and a neutral instrument motif.
-->
<svg width="760" height="1440" viewBox="0 0 760 1440" fill="none" xmlns="http://www.w3.org/2000/svg">
	<defs>
