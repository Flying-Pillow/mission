			<stop stop-color="#07111D" />
			<stop offset="0.55" stop-color="#0B1625" />
			<stop offset="1" stop-color="#0A0F18" />
		</linearGradient>
		<radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 164) rotate(90) scale(280 330)">
			<stop offset="0" stop-color="#35D5FF" stop-opacity="0.20" />
			<stop offset="0.38" stop-color="#C81BFF" stop-opacity="0.12" />
