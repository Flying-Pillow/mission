	<text x="88" y="1144" fill="#F6FBFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">04. Mission Graph</text>
	<text x="88" y="1180" fill="#A4B9CF" font-family="Arial, sans-serif" font-size="20">Goal: make dependency state legible and actionable.</text>
