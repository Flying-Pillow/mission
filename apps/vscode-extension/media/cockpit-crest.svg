<!--
	@file apps/vscode-extension/media/cockpit-crest.svg
	@description Provides a reusable Mission cockpit crest built from neutral instrument geometry.
-->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<radialGradient id="mission-crest-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 192) rotate(90) scale(224 224)">
			<stop offset="0" stop-color="#35D5FF" stop-opacity="0.26" />
			<stop offset="0.58" stop-color="#6D8CFF" stop-opacity="0.14" />
			<stop offset="1" stop-color="#08111B" stop-opacity="0" />
		</radialGradient>
		<linearGradient id="mission-crest-stroke" x1="88" y1="84" x2="424" y2="428" gradientUnits="userSpaceOnUse">
			<stop stop-color="#5BE4FF" />
			<stop offset="0.55" stop-color="#8AB8FF" />
			<stop offset="1" stop-color="#FFC064" />
		</linearGradient>
	</defs>

	<rect width="512" height="512" rx="128" fill="#070C14" />
	<rect x="26" y="26" width="460" height="460" rx="102" stroke="url(#mission-crest-stroke)" stroke-opacity="0.24" stroke-width="2" />
	<circle cx="256" cy="192" r="224" fill="url(#mission-crest-glow)" />

	<circle cx="256" cy="220" r="128" fill="#0B1622" stroke="#8AB8FF" stroke-opacity="0.45" stroke-width="8" />
	<circle cx="256" cy="220" r="88" fill="#08111B" stroke="#4EDFFF" stroke-opacity="0.7" stroke-width="8" stroke-dasharray="12 10" />
	<circle cx="256" cy="220" r="20" fill="#EAF8FF" />
	<circle cx="256" cy="220" r="10" fill="#07111D" />

	<path d="M256 122V150" stroke="#D9F7FF" stroke-opacity="0.8" stroke-width="8" stroke-linecap="round" />
	<path d="M256 290V318" stroke="#D9F7FF" stroke-opacity="0.8" stroke-width="8" stroke-linecap="round" />
	<path d="M158 220H186" stroke="#D9F7FF" stroke-opacity="0.72" stroke-width="8" stroke-linecap="round" />
	<path d="M326 220H354" stroke="#D9F7FF" stroke-opacity="0.72" stroke-width="8" stroke-linecap="round" />

	<path d="M256 150L286 220L256 290L226 220L256 150Z" fill="#FFB55A" fill-opacity="0.9" stroke="#FFD9A1" stroke-opacity="0.55" stroke-width="4" />
	<path d="M212 344H300" stroke="#55E3FF" stroke-opacity="0.85" stroke-width="10" stroke-linecap="round" />
	<path d="M190 376H322" stroke="#8AB8FF" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round" />

	<path d="M104 144H164" stroke="#5C718E" stroke-opacity="0.45" stroke-width="2" />
	<path d="M348 144H408" stroke="#5C718E" stroke-opacity="0.45" stroke-width="2" />
	<path d="M86 392H176" stroke="#5C718E" stroke-opacity="0.4" stroke-width="2" />
	<path d="M336 392H426" stroke="#5C718E" stroke-opacity="0.4" stroke-width="2" />
</svg>